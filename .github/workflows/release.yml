name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: rustup component add rustfmt clippy llvm-tools-preview
      - name: Install graphics dependencies for headless testing
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev mesa-vulkan-drivers
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build
        run: cargo build
      - name: Run tests with coverage
        run: xvfb-run -a cargo llvm-cov --lcov --output-path lcov.info || true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
      - name: clippy
        run: cargo clippy --no-deps -- -D warnings
      - name: fmt
        run: cargo fmt --check

  publish-crates:
    name: Publish crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true

  publish-binary:
    name: Publish binary (${{ matrix.os }})
    needs: publish-crates
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: mapvas-macos.zip
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cargo build --release --locked
          zip -j mapvas.zip target/release/mapvas target/release/mapcat
      - name: Upload binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: mapvas.zip
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
      - name: Update homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config --unset-all http.https://github.com/.extraheader
          git clone https://udho:$GITHUB_TOKEN@github.com/udho/homebrew-mapvas
          export MAPVAS_VERSION=$(git tag -l | tail -n1)
          export MAPVAS_SHA=$(shasum -a 256 mapvas.zip | awk '{print $1}')
          cd homebrew-mapvas
          sed "s/VERSION/$MAPVAS_VERSION/g" formula.template | sed "s/SHA/$MAPVAS_SHA/g" > Formula/mapvas.rb
          git config user.name "UpdateBot"
          git config user.email "hoffmann.odu@gmail.com"
          git add -A
          git commit -m "$MAPVAS_VERSION"
          git push https://udho:$GITHUB_TOKEN@github.com/udho/homebrew-mapvas
